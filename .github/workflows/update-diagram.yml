name: Update Architecture Diagram

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**/*.tf'
      - 'supabase/migrations/*.sql'
      - 'supabase/functions/**'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update-diagram:
    name: Regenerate Mermaid diagram
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect infrastructure context
        id: context
        run: |
          echo "Collecting Terraform and Supabase context..."

          # Collect all TF files
          TF_CONTENT=""
          while IFS= read -r -d '' f; do
            TF_CONTENT+="### $f\n"
            TF_CONTENT+=$(cat "$f")
            TF_CONTENT+="\n\n"
          done < <(find terraform -name "*.tf" -not -name "imports.tf" -print0 | sort -z)

          # Collect migration names
          MIGRATIONS=$(ls supabase/migrations/*.sql 2>/dev/null | xargs -I{} basename {} | tr '\n' ',' | sed 's/,$//')

          # Collect edge functions
          FUNCTIONS=$(ls supabase/functions/ 2>/dev/null | tr '\n' ',' | sed 's/,$//')

          # Save to file to avoid env var size limits
          {
            echo "TERRAFORM_FILES:"
            echo "$TF_CONTENT"
            echo "MIGRATIONS: $MIGRATIONS"
            echo "EDGE_FUNCTIONS: $FUNCTIONS"
          } > /tmp/infra_context.txt

          echo "context_file=/tmp/infra_context.txt" >> "$GITHUB_OUTPUT"

      - name: Generate updated diagram with OpenAI
        id: generate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          CONTEXT=$(cat /tmp/infra_context.txt)
          DATE=$(date +%Y-%m-%d)

          # Read current README for reference
          CURRENT_README=$(cat README.md)

          PROMPT="You are an infrastructure architect. Analyze the following Terraform configuration and generate an updated Mermaid diagram for the README.md.\n\n## Current Terraform Infrastructure:\n$CONTEXT\n\n## Current README (for reference):\n$CURRENT_README\n\n## Instructions:\n1. Analyze all .tf files and extract: S3 buckets, CloudFront distributions, Route53 records, ACM certificates, Supabase projects, and any other AWS resources.\n2. Generate a Mermaid graph TB diagram that accurately represents the current infrastructure.\n3. Use these node styles: AWS resources=orange (#FF9900), Supabase=green (#3ECF8E), CloudFront=purple (#8B5CF6), S3=dark green (#569A31), Apps=blue (#0EA5E9), GitHub Actions=dark (#24292E).\n4. Keep the diagram clean and readable. Group related resources in subgraphs.\n5. Return ONLY the content between the \`\`\`mermaid and \`\`\` fences — nothing else.\n6. Today's date is $DATE."

          # Call OpenAI API
          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg prompt "$PROMPT" \
              '{
                model: "gpt-4o-mini",
                max_tokens: 4096,
                messages: [{"role": "user", "content": $prompt}]
              }'
            )")

          # Extract the diagram content
          DIAGRAM=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          text = data['choices'][0]['message']['content']
          print(text)
          ")

          echo "$DIAGRAM" > /tmp/new_diagram.txt
          echo "diagram_generated=true" >> "$GITHUB_OUTPUT"

      - name: Update README.md
        run: |
          DATE=$(date +%Y-%m-%d)
          NEW_DIAGRAM=$(cat /tmp/new_diagram.txt)

          # Replace the mermaid block in README.md using Python for reliability
          python3 << 'PYEOF'
          import re, sys

          with open('README.md', 'r') as f:
              content = f.read()

          with open('/tmp/new_diagram.txt', 'r') as f:
              new_diagram = f.read().strip()

          import datetime
          date_str = datetime.date.today().isoformat()

          # Replace mermaid block
          new_block = f'```mermaid\n{new_diagram}\n```'
          updated = re.sub(r'```mermaid.*?```', new_block, content, flags=re.DOTALL)

          # Update the last-updated footer
          updated = re.sub(
              r'\*Diagram last updated: .+?\*',
              f'*Diagram last updated: {date_str} — auto-maintained by [update-diagram.yml](.github/workflows/update-diagram.yml)*',
              updated
          )

          with open('README.md', 'w') as f:
              f.write(updated)

          print("README.md updated successfully")
          PYEOF

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet README.md && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: auto-update architecture diagram [$(date +%Y-%m-%d)]"
          branch: auto/update-diagram
          delete-branch: true
          title: "docs: 🗺️ auto-update architecture diagram"
          body: |
            ## Auto-generated architecture diagram update

            This PR was automatically created by the `update-diagram.yml` workflow after infrastructure changes were detected.

            ### What changed?
            The Mermaid architecture diagram in `README.md` has been regenerated using OpenAI GPT-4o-mini to reflect the latest Terraform configuration.

            ### Changes detected in:
            ${{ github.event.head_commit.message }}

            ---
            *Review the diagram below and merge if it looks correct.*
          labels: |
            documentation
            automated
