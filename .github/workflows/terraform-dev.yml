name: Terraform Dev

on:
  push:
    branches: [main]
    paths:
      - 'terraform/environments/dev/**'
      - 'terraform/modules/**'
  pull_request:
    branches: [main]
    paths:
      - 'terraform/environments/dev/**'
      - 'terraform/modules/**'

jobs:
  terraform:
    name: Terraform Plan & Apply (Dev)
    runs-on: ubuntu-latest
    environment:
      name: dev
    defaults:
      run:
        working-directory: terraform/environments/dev

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      TF_VAR_supabase_access_token: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      TF_VAR_supabase_org_id: ${{ secrets.TF_VAR_SUPABASE_ORG_ID }}
      TF_VAR_supabase_dev_db_password: ${{ secrets.TF_VAR_SUPABASE_DEV_DB_PASSWORD }}
      TF_VAR_supabase_prod_db_password: ${{ secrets.TF_VAR_SUPABASE_PROD_DB_PASSWORD }}
      TF_VAR_acm_certificate_arn: ${{ secrets.TF_VAR_ACM_CERTIFICATE_ARN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan

      - name: Terraform Output
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "### ✅ Terraform Applied (Dev)" >> $GITHUB_STEP_SUMMARY
          terraform output
