name: Deploy Edge Functions (affected only)

on:
  push:
    branches: [main]
    paths:
      - 'apps/supabase/functions/**'
  workflow_dispatch:
    inputs:
      functions:
        description: 'Space-separated list of functions to deploy (leave empty to deploy all)'
        required: false
        default: ''

jobs:
  deploy-functions:
    name: Deploy changed Supabase Edge Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find changed Edge Functions
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.functions }}" ]; then
              CHANGED="${{ github.event.inputs.functions }}"
              echo "workflow_dispatch: deploying specified functions: $CHANGED"
            else
              # Deploy all functions
              CHANGED=$(ls apps/supabase/functions/ | tr '\n' ' ')
              echo "workflow_dispatch: deploying all functions: $CHANGED"
            fi
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'apps/supabase/functions/' | \
              grep -oP 'apps/supabase/functions/\K[^/]+' | sort -u | tr '\n' ' ')
            echo "push: changed functions: $CHANGED"
          fi
          echo "functions=$CHANGED" >> $GITHUB_OUTPUT

      - name: Setup Supabase CLI
        if: steps.changed.outputs.functions != ''
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy changed functions
        if: steps.changed.outputs.functions != ''
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_PAT }}
        run: |
          for fn in ${{ steps.changed.outputs.functions }}; do
            echo "Deploying $fn..."
            supabase functions deploy $fn --project-ref klpshxvjzsdqolkrabvb
            echo "✅ Deployed $fn"
          done

      - name: Skip (no changes)
        if: steps.changed.outputs.functions == ''
        run: echo "ℹ️ No Edge Function changes detected — skipping"

      - name: Summary
        if: steps.changed.outputs.functions != ''
        run: |
          echo "### ✅ Edge Functions Deployed" >> $GITHUB_STEP_SUMMARY
          echo "**Functions:** ${{ steps.changed.outputs.functions }}" >> $GITHUB_STEP_SUMMARY
          echo "**Project:** klpshxvjzsdqolkrabvb" >> $GITHUB_STEP_SUMMARY
